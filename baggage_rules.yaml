# Conservative baggage model for SCL → LHR, focused on moving with heavy luggage.
# True checked-bag prices are fare-family, route, status, booking-channel, and operating-carrier dependent.
# Treat these as estimates unless the API source returns included baggage and ancillary prices.

settings:
  default_bags_per_person: 2
  default_use_airline_max_weight: true
  use_strictest_interline_limit: true
  notes: >-
    In airline-max mode, the dashboard sets each requested checked bag to the
    maximum per-piece checked-bag weight allowed by the visible carrier/cabin rule.
    For mixed-carrier itineraries it uses the strictest visible limit.

rules:
  default:
    airline_name: Default airline policy
    standard_checked_weight_kg: 23
    max_checked_weight_kg: 32
    standard_checked_linear_cm: 158
    max_checked_bags_in_economy_estimate: 1
    included_checked_bags_fallback: 1
    overweight_fee_estimate_gbp: 90
    extra_bag_fee_estimate_gbp: 140
    notes: "Most economy fares include 0–1 checked bag at 23 kg; 23–32 kg usually requires overweight/special handling fees."

  BA:
    airline_name: British Airways
    standard_checked_weight_kg: 23
    max_checked_weight_kg: 32
    standard_checked_linear_cm: 158
    max_checked_linear_cm: "190 x 75 x 65"
    max_checked_weight_by_cabin_kg:
      economy: 32
      premium_economy: 32
      business: 32
      first: 32
    standard_checked_weight_by_cabin_kg:
      economy: 23
      premium_economy: 23
      business: 32
      first: 32
    included_checked_bags_fallback_by_cabin:
      economy: 1
      premium_economy: 2
      business: 2
      first: 2
    included_checked_bags_fallback: 1
    overweight_fee_estimate_gbp: 65
